name: frat_finance_tracker
description: A Flutter app for tracking fraternity dues and payments
publish_to: 'none'
version: 1.3.2+3

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Backend & Auth
  supabase_flutter: ^2.5.0

  # Navigation
  go_router: ^14.0.0

  # UI & Calendar
  table_calendar: ^3.1.0
  intl: ^0.19.0

  # Local Storage
  sqflite: ^2.3.0
  shared_preferences: ^2.2.0

  # Notifications
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0

  # Utilities
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  uuid: ^4.2.0

  # Environment variables
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.0
  freezed: ^2.5.0
  flutter_launcher_icons: ^0.13.1
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

  # Linting
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - .env
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "ios/Runner/Assets.xcassets/AppIcon.appiconset/1024.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "ios/Runner/Assets.xcassets/AppIcon.appiconset/1024.png"
